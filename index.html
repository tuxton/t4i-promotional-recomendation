<html lang="es">
<head>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

      --app-max-width: 560px;
      --app-side-pad: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background:
        radial-gradient(ellipse 75% 65% at 22% 45%, #2d0f6e 0%, transparent 65%),
        radial-gradient(ellipse 50% 45% at 80% 80%, #1a0540 0%, transparent 55%),
        #130a2a;
      min-height: 100vh;
      font-family: 'Gibson-Semibold', sans-serif;
      color: #fff;
    }

    #root {
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px var(--app-side-pad) 46px;
      position: relative;
      z-index: 1;
    }

    .topbar {
      width: 100%;
      max-width: var(--app-max-width);
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      padding: 0 4px;

    .nx-wordmark {
      font-family: 'Gibson-Semibold', sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -.01em;
    }

    .powered {
      font-size: 10px;
      color: rgba(255,255,255,.25);
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .hero {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 24px;
      width: 100%;
      max-width: var(--app-max-width);
    }

    .hero-deco {
      position: absolute;
      width: 52px;
      opacity: .55;
      pointer-events: none;
      filter: drop-shadow(0 0 16px rgba(255,94,0,.25));
    }

    .hero-deco.left {
      left: -8px;
      top: 8px;
      transform: rotate(-18deg);
    }

    .hero-deco.right {

      top: 36px;
      transform: rotate(16deg);
    }

    .t4i-logo {
      width: 100%;
      max-width: 100%;
      height: auto;
      margin-bottom: 16px;
    }

    .sub {
      font-size: 13px;
      color: rgba(255,255,255,.45);
      text-align: center;
      line-height: 1.5;
      padding: 0 8px;

    .sub em {

      font-style: normal;

    .event-stats {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 14px;

    .stat-chip {

      text-align: center;

    .stat-num {
      display: block;

      font-weight: 700;
      letter-spacing: .02em;
      color: #fff;
      text-shadow: 0 0 14px rgba(255,94,0,.3);

    .stat-lbl {
      display: block;
      margin-top: 1px;
      font-size: 11px;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: rgba(255,255,255,.65);
    }

    .card {
      background: rgba(28,16,64,.75);
      border: 1px solid rgba(139,60,210,.25);
      border-radius: 18px;
      width: 100%;
      max-width: var(--app-max-width);
      overflow: hidden;
    }

    .form-wrap {
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .lbl {
      font-size: 12px;
      letter-spacing: .1em;
      color: rgba(255,255,255,.35);
      text-transform: uppercase;
      margin-bottom: 5px;

      padding: 12px 14px;

      color: #fff;

    .inp:focus {

    .inp::-webkit-input-placeholder { color: rgba(180,150,255,.65); }

    .inp:-ms-input-placeholder       { color: rgba(180,150,255,.65); }

      background-size: 220% 220%;

      height: 8px;
      border-radius: 50%;

      animation: bop 1.2s ease-in-out infinite;

    .dot:nth-child(2) { animation-delay: .2s; }

    @keyframes bop {

    .particle-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      opacity: .42;
      mix-blend-mode: normal;
      filter: blur(.35px);
      z-index: 0;

    .blob {
      position: absolute;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      filter: blur(45px);
      opacity: .12;
      z-index: 2;
      animation: drift 14s ease-in-out infinite;

    .blob.b1 { background: #ff5e00; top: -80px; left: -90px; }
    .blob.b2 { background: #7a1ec7; bottom: -120px; right: -100px; animation-delay: -4s; }
    .blob.b3 { background: #18c3ff; top: 38%; left: 65%; width: 260px; height: 260px; animation-delay: -8s; }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%      { transform: translate(20px, -16px) scale(1.05); }
      66%      { transform: translate(-18px, 14px) scale(0.96); }
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }

<body>
  <div class="stage-bg">
    <canvas id="particle-canvas" class="particle-canvas"></canvas>
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>
  <div id="root"></div>
  <footer class="gh-footer">
    <a href="https://github.com/tuxton/t4i-promotional-recomendation" target="_blank" rel="noopener noreferrer">Ver código fuente en GitHub</a>
  </footer>

  <script>
    const { useState, useEffect, useRef } = React;
    const E = React.createElement;

    function initParticleBackground() {
      const canvas = document.getElementById("particle-canvas");
      if (!canvas) return;

      const prefersReduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const ctx = canvas.getContext("2d", { alpha: true, desynchronized: true });
      if (!ctx) return;

      let width = 0;
      let height = 0;
      let particles = [];
      let rafId = 0;
      let lastTs = 0;
      let frameCount = 0;
      let fpsWindowStart = 0;
      let densityScale = 1;
      let dust = [];

      function baseCountForScreen(w) {
        if (prefersReduced) {
          if (w < 430) return 120;
          if (w < 900) return 180;
          return 260;
        }
        if (w < 430) return 240;
        if (w < 900) return 360;
        return 520;
      }

      function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const target = Math.floor(baseCountForScreen(width) * densityScale);
        particles = Array.from({ length: target }, () => ({
          x: Math.random() * width,
          y: Math.random() * height,
          r: Math.random() * 1.0 + 0.2,
          a: Math.random() * 0.25 + 0.05,
          s: Math.random() * 0.75 + 0.15,
          t: Math.random() * Math.PI * 2,
          pulse: Math.random() * Math.PI * 2,
          hue: Math.random() > 0.75 ? 22 : Math.random() > 0.5 ? 198 : 278,
        }));

        const dustCount = Math.floor(target * 0.08);
        dust = Array.from({ length: dustCount }, () => ({
          x: Math.random() * width,
          y: Math.random() * height,
          r: Math.random() * 0.55 + 0.08,
          t: Math.random() * Math.PI * 2,
          a: Math.random() * 0.2 + 0.04,
        }));
      }

      function step(ts) {
        if (!fpsWindowStart) fpsWindowStart = ts;
        if (!lastTs) lastTs = ts;
        const dt = Math.min((ts - lastTs) / 16.67, 2.4);
        lastTs = ts;
        frameCount++;

        // En vez de limpiar completamente, dejamos una estela tenue tipo polvo cósmico.
        ctx.fillStyle = "rgba(14, 8, 30, 0.32)";
        ctx.fillRect(0, 0, width, height);

        // Acentuamos visibilidad con partículas brillantes y pequeño pulso.
        ctx.globalCompositeOperation = "source-over";

        for (let i = 0; i < particles.length; i++) {
          const p = particles[i];
          const motionScale = prefersReduced ? 0.25 : 1;
          p.t += 0.0035 * dt * motionScale;
          p.pulse += 0.02 * dt * motionScale;
          p.x += (Math.cos(p.t * 1.7) * 0.35 + Math.sin(p.t * 0.9) * 0.22) * p.s * dt * motionScale;
          p.y += (Math.sin(p.t * 1.5) * 0.35 + Math.cos(p.t * 0.7) * 0.22) * p.s * dt * motionScale;

          if (p.x < -6) p.x = width + 6;
          if (p.x > width + 6) p.x = -6;
          if (p.y < -6) p.y = height + 6;
          if (p.y > height + 6) p.y = -6;

          const pulseScale = 0.92 + Math.sin(p.pulse) * 0.16;
          const radius = p.r * pulseScale;
          const alpha = Math.max(0.03, Math.min(0.32, p.a * pulseScale));

          ctx.beginPath();
          ctx.fillStyle = "hsla(" + p.hue + ", 88%, 70%, " + alpha + ")";
          ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
          ctx.fill();
        }

        // Capas extra de estrellitas que titilan para lograr efecto de stardust.
        for (let i = 0; i < dust.length; i++) {
          const d = dust[i];
          d.t += 0.025 * dt;
          const tw = 0.6 + Math.sin(d.t) * 0.4;
          ctx.beginPath();
          ctx.fillStyle = "rgba(245, 250, 255, " + (d.a * tw) + ")";
          ctx.arc(d.x, d.y, d.r * tw, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.globalCompositeOperation = "source-over";

        if (ts - fpsWindowStart > 1800) {
          const fps = (frameCount * 1000) / (ts - fpsWindowStart);
          frameCount = 0;
          fpsWindowStart = ts;

          // Auto-throttle: preserva fluidez en hardware débil.
          if (fps < 42 && densityScale > 0.35) {
            densityScale *= 0.86;
            resize();
          } else if (fps > 57 && densityScale < 1) {
            densityScale = Math.min(1, densityScale * 1.07);
            resize();
          }
        }

        rafId = window.requestAnimationFrame(step);
      }

      function onVisibility() {
        if (document.hidden) {
          window.cancelAnimationFrame(rafId);
          rafId = 0;
          return;
        }
        if (!rafId) {
          lastTs = 0;
          fpsWindowStart = 0;
          frameCount = 0;
          rafId = window.requestAnimationFrame(step);
        }
      }

      resize();
      rafId = window.requestAnimationFrame(step);
      window.addEventListener("resize", resize, { passive: true });
      document.addEventListener("visibilitychange", onVisibility);
    }

    function toVector(features) {
      return FEATURE_ORDER.map(d => Number(features[d] || 0));

    function normalize(vec) {
      const norm = Math.sqrt(vec.reduce((acc, v) => acc + v * v, 0));
      if (!norm) return vec;
      return vec.map(v => v / norm);
    }

    function dot(a, b) {
      let sum = 0;
      for (let i = 0; i < a.length; i++) sum += a[i] * b[i];
      return sum;
    }

    function baselineScores(role, skills) {
      const text = (role + " " + skills).toLowerCase();
      const raw = {};
      for (const [id, p] of Object.entries(PROFILES)) {
        let s = 18;
        for (const k of p.kwds) { if (text.includes(k)) s += 9; }
        for (const r of p.role) { if (text.includes(r)) s += 14; }
        raw[id] = s;
      }
      const max = Math.max(...Object.values(raw));
      const f = max < 75 ? 75 / max : max > 100 ? 100 / max : 1;
      const out = {};
      for (const [id, v] of Object.entries(raw)) out[id] = Math.min(Math.round(v * f), 100);
      return out;
    }

    function buildUserTower(role, skills) {
      const text = (role + " " + skills).toLowerCase();
      const feats = {};
      FEATURE_ORDER.forEach(d => { feats[d] = 0; });

      for (const rule of FEATURE_RULES) {
        for (const term of rule.terms) {
          if (text.includes(term)) feats[rule.dim] += 1;
        }
      }

      // Fallback suave para evitar vector nulo cuando hay muy poca señal.
      const hasSignal = FEATURE_ORDER.some(d => feats[d] > 0);
      if (!hasSignal) {
        feats.product = 1;
        feats.backend = 1;
      }

      return normalize(toVector(feats));
    }

    function userFeatureMap(role, skills) {
      const text = (role + " " + skills).toLowerCase();
      const feats = {};
      FEATURE_ORDER.forEach(d => { feats[d] = 0; });
      for (const rule of FEATURE_RULES) {
        for (const term of rule.terms) {
          if (text.includes(term)) feats[rule.dim] += 1;
        }
      }
      return feats;
    }

    function buildTalkTower(id) {
      if (TALK_TOWER[id]) return normalize(toVector(TALK_TOWER[id]));

      // Fallback para charlas nuevas: inferimos embedding usando keywords del perfil.
      const feats = {};
      FEATURE_ORDER.forEach(d => { feats[d] = 0; });
      const p = PROFILES[id];
      if (!p) return normalize(toVector(feats));

      for (const kw of [...p.kwds, ...p.role]) {
        for (const rule of FEATURE_RULES) {
          for (const term of rule.terms) {
            if (kw.includes(term) || term.includes(kw)) feats[rule.dim] += 0.3;
          }
        }
      }

      return normalize(toVector(feats));
    }

    function computeScores(role, skills) {
      const userVec = buildUserTower(role, skills);
      const out = {};
      for (const id of Object.keys(PROFILES)) {
        const talkVec = buildTalkTower(id);
        const sim = Math.max(0, dot(userVec, talkVec));
        out[id] = Math.min(100, Math.round(40 + sim * 60));
      }
      return out;
    }

    function rankMap(scores) {
      const ids = Object.entries(scores).sort((a, b) => b[1] - a[1]).map(([id]) => id);
      const m = {};
      ids.forEach((id, i) => { m[id] = i + 1; });
      return m;
    }

    function topSignals(role, skills, maxItems) {

      const arr = Object.entries(feats)

        .slice(0, maxItems || 4);
      const max = arr.length ? arr[0][1] : 1;
      return arr.map(([k, v]) => ({ name: k.toUpperCase(), value: v, pct: Math.round((v / max) * 100) }));
    }

        setRole(profile.role);
        setSnry(profile.snry);
        setSelectedSkills(profile.skills.filter(s => skillsList.includes(s)));
        setCustomSkills(profile.skills.filter(s => !skillsList.includes(s)).join(", "));
      };

      const skillsText = selectedSkills.join(" ") + " " + customSkills;
      const canGo = name.trim().length > 1 && role.trim().length > 1 && (selectedSkills.length > 0 || customSkills.trim().length > 3);

      const go = () => {
        setPhase("loading");
        setTimeout(() => { setRes(recommend(role, skillsText, name, snry, talks)); setPhase("results"); }, 1500);
      };

      const reset = () => {
        setPhase("input"); setRes(null);
        setName(""); setRole(""); setSelectedSkills([]); setCustomSkills(""); setSnry("");
      };

      const SITE_URL = "https://t4i-promotional-recomendation.vercel.app/";
      const SHARE_TEXT = "Aprendiendo sobre modelos de recomendaci\u00f3n para Promociones en la Tech4Impact \uD83D\uDE80 #Tech4Impact #T4I #NaranjaX #ModelosDeRecomendacion " + SITE_URL;

      function onShare(network) {
        if (network === "twitter") {
          window.open("https://twitter.com/intent/tweet?text=" + encodeURIComponent(SHARE_TEXT), "_blank", "noopener,noreferrer");
        } else if (network === "linkedin") {
          window.open("https://www.linkedin.com/sharing/share-offsite/?url=" + encodeURIComponent(SITE_URL), "_blank", "noopener,noreferrer");
        } else if (network === "instagram") {
          if (navigator.share) {
            navigator.share({ text: SHARE_TEXT, url: SITE_URL }).catch(() => {});
          } else {
            navigator.clipboard?.writeText(SHARE_TEXT).then(
              () => setShareHint("Texto copiado. Pegalo en tu historia de Instagram."),
              () => setShareHint("Abr\u00ed Instagram y compart\u00ed el link manualmente.")
            );
          }
        }
      }



      const snrySt = s => ({
        padding: "7px 14px", borderRadius: "50px", fontSize: "12px", cursor: "pointer",
        fontFamily: "'Gibson-Semibold',sans-serif", fontWeight: "600",
        letterSpacing: ".04em", transition: "all .2s",
        border:      snry === s ? "1px solid #ff5e00"           : "1px solid rgba(115,33,166,.4)",
        background:  snry === s ? "linear-gradient(90deg,#ff5e00,#7321a6)" : "rgba(115,33,166,.12)",
        color:       snry === s ? "#fff"                         : "rgba(180,150,255,.55)",
        boxShadow:   snry === s ? "0 0 12px #ff5e0066"           : "none",
      });

      /* ── LOADING ── */
      if (phase === "loading") return E("div", { style: shellSt },
        E(Topbar),
        E(Hero, { sub: "Analizando tu perfil con el motor de recomendación..." }),
        E("div", { className: "card", style: { width: "100%" } },
          E("div", { className: "loading-wrap" },
            E("div", { className: "dots" }, [0,1,2].map(i => E("div", { key: i, className: "dot" }))),
            E("p", { className: "ld-txt" }, "Proyectando embedding de usuario..."),
            E("p", { className: "ld-txt", style: { color: "rgba(180,150,255,.2)" } }, "Calculando dot product con el catálogo...")
          )
        )
      );

      /* ── RESULTS O COMPARATOR ── */
      if (phase === "results" && res) return E("div", { style: shellSt },
        E(Topbar),
        E(Hero, { sub: E("span", null, showComparator ? "¿Cómo decide el modelo?" : "Tu agenda ", E("em", null, "personalizada"), showComparator ? " paso a paso" : " para hoy") }),
        E("div", { className: "card", style: { width: "100%" } },
          showComparator
            ? E(ModelComparator, {
                res, cmpTalk, setCmpTalk,
                onBack: () => setShowComparator(false),
                recomendaciones: res.recomendaciones,
                nombre_display: res.nombre_display,
                userRole: role,
                userSkills: selectedSkills.join(" ") + " " + customSkills,
                snry,
              })
            : E("div", { className: "res-wrap" },
                E("div", { className: "chip" },
                  E("div", { className: "av" }, ini(res.nombre_display)),
                  E("div", { style: { flex: 1, minWidth: 0 } },
                    E("div", { className: "pname" }, res.nombre_display),
                    E("div", { className: "prole" }, res.resumen_perfil)
                  )
                ),
                E("p", { className: "sec-lbl" }, "Charlas rankeadas para vos"),
                res.recomendaciones.map((r, i) =>
                  E("div", { key: r.id, className: "tk" + (r.rank === 1 ? " r1" : "") },
                    E("div", { className: "tk-top" },
                      E("span", { className: "rk", style: { color: RANK_COLORS[i] } }, "#" + r.rank),
                      E("span", { className: "tk-title" }, r.talk?.title || r.id),
                      E("span", { className: "sc", style: { color: RANK_COLORS[i] } }, r.score)
                    ),
                    E(Bar, { score: r.score, color: RANK_BAR[i], delay: i * 180 + 80 }),
                    E("p", { className: "reason" }, r.razon)
                  )
                ),
                E("div", { className: "share-row" },
                  E("button", {
                    className: "impact-share tw",
                    title: "Compartir en X (Twitter)",
                    onClick: () => onShare("twitter"),
                  }, E("svg", { xmlns: "http://www.w3.org/2000/svg", width: 18, height: 18, viewBox: "0 0 24 24", fill: "currentColor" },
                    E("path", { d: "M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L2.25 2.25h6.942l4.262 5.633L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z" })
                  )),
                  E("button", {
                    className: "impact-share ig",
                    title: "Compartir en Instagram",
                    onClick: () => onShare("instagram"),
                  }, E("svg", { xmlns: "http://www.w3.org/2000/svg", width: 18, height: 18, viewBox: "0 0 24 24", fill: "currentColor" },
                    E("path", { d: "M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z" })
                  )),
                  E("button", {
                    className: "impact-share li",
                    title: "Compartir en LinkedIn",
                    onClick: () => onShare("linkedin"),
                  }, E("svg", { xmlns: "http://www.w3.org/2000/svg", width: 18, height: 18, viewBox: "0 0 24 24", fill: "currentColor" },
                    E("path", { d: "M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" })
                  )),
                  E("button", {
                    className: "share",
                    onClick: () => setShowComparator(true)
                  }, "\u00bfC\u00f3mo decide el modelo?")
                ),
                shareHint ? E("p", { className: "share-hint" }, shareHint) : null,
                E("button", { className: "again", onClick: reset }, "← Probar con otro perfil")
              )
        ),
        E("p", { className: "ev-tag" }, "Tech4Impact by NaranjaX")
      );
    // --- Componente visual de comparativa avanzada ---
    function ModelComparator({ res, cmpTalk, setCmpTalk, onBack, recomendaciones, nombre_display, userRole, userSkills, snry }) {
      // Obtener embedding usuario y charla seleccionada
      const userVec = buildUserTower(userRole, userSkills);
      const talkVec = buildTalkTower(cmpTalk);
      const baseline = baselineScores(userRole, userSkills);
      const scores = computeScores(userRole, userSkills);
      const talk = (recomendaciones || []).find(r => r.id === cmpTalk);
      const talkTitle = talk?.talk?.title || cmpTalk;
      // Features activadas
      const userFeats = userFeatureMap(userRole, userSkills);
      // Dot product paso a paso
      const dotSteps = FEATURE_ORDER.map((f, i) => ({
        name: f.toUpperCase(),
        user: userVec[i],
        talk: talkVec[i],
        prod: userVec[i] * talkVec[i],
        rawUser: userFeats[f],
      }));
      const dotSum = dot(userVec, talkVec);
      // Explicación textual
      const mainFeat = dotSteps.reduce((a, b) => (b.prod > a.prod ? b : a), dotSteps[0]);
      const explain =
        mainFeat.prod > 0.12
          ? `La feature más determinante fue "${mainFeat.name}" (user: ${mainFeat.user.toFixed(2)}, charla: ${mainFeat.talk.toFixed(2)}).`
          : "No hubo una feature dominante, el score es más balanceado.";

      return E("div", { className: "res-wrap" },
        E("div", { className: "chip" },
          E("div", { className: "av" }, ini(nombre_display)),
          E("div", { style: { flex: 1, minWidth: 0 } },
            E("div", { className: "pname" }, nombre_display),
            E("div", { className: "prole" }, userRole + " · " + snry)
          )
        ),
        E("p", { className: "sec-lbl" }, "Comparativa visual de modelo"),
        E("div", { style: { margin: "10px 0 18px 0" } },
          E("label", { className: "lbl" }, "Charla a comparar"),
          E("div", { style: { display: "flex", gap: 8, flexWrap: "wrap" } },
            recomendaciones.map(r =>
              E("button", {
                key: r.id,
                className: "skill-btn" + (cmpTalk === r.id ? " active" : ""),
                style: { fontSize: 12, padding: "7px 14px" },
                onClick: () => setCmpTalk(r.id)
              }, r.talk?.title || r.id)
            )
          )
        ),
        E("div", { style: { margin: "10px 0 18px 0" } },
          E("label", { className: "lbl" }, "Embeddings (User vs Charla)"),
          E("div", { style: { display: "flex", gap: 18, flexWrap: "wrap" } },
            E("div", { style: { flex: 1 } },
              E("div", { style: { fontSize: 11, color: "#18c3ff", marginBottom: 4 } }, "User Tower"),
              FEATURE_ORDER.map((f, i) =>
                E("div", { key: f, style: { display: "flex", alignItems: "center", marginBottom: 2 } },
                  E("span", { style: { width: 78, minWidth: 0, fontSize: 10, color: "#fff8", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, f.toUpperCase()),
                  E("div", { style: { background: "#18c3ff33", borderRadius: 6, height: 8, width: 80, margin: "0 6px" } },
                    E("div", { style: { background: "#18c3ff", height: 8, borderRadius: 6, width: (userVec[i] * 80).toFixed(1) + "px", transition: "width .7s" } })
                  ),
                  E("span", { style: { fontSize: 10, color: "#18c3ff" } }, userVec[i].toFixed(2))
                )
              )
            ),
            E("div", { style: { flex: 1 } },
              E("div", { style: { fontSize: 11, color: "#ff5e00", marginBottom: 4 } }, "Talk Tower"),
              FEATURE_ORDER.map((f, i) =>
                E("div", { key: f, style: { display: "flex", alignItems: "center", marginBottom: 2 } },
                  E("span", { style: { width: 78, minWidth: 0, fontSize: 10, color: "#fff8", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, f.toUpperCase()),
                  E("div", { style: { background: "#ff5e0033", borderRadius: 6, height: 8, width: 80, margin: "0 6px" } },
                    E("div", { style: { background: "#ff5e00", height: 8, borderRadius: 6, width: (talkVec[i] * 80).toFixed(1) + "px", transition: "width .7s" } })
                  ),
                  E("span", { style: { fontSize: 10, color: "#ff5e00" } }, talkVec[i].toFixed(2))
                )
              )
            )
          )
        ),
        E("div", { style: { margin: "4px 0 18px 0" } },
          E("label", { className: "lbl" }, "Radar de features (User Tower vs Talk Tower)"),
          E(RadarFeatures, {
            labels: FEATURE_ORDER.map(f => f.toUpperCase()),
            userVec,
            talkVec,
          })
        ),
        E("div", { style: { margin: "10px 0 18px 0" } },
          E("label", { className: "lbl" }, "Dot product paso a paso"),
          E("div", { style: { border: "1px solid #fff2", borderRadius: 8, padding: 10, background: "rgba(255,255,255,.03)" } },
            // Encabezado de columnas
            E("div", { style: { display: "flex", alignItems: "center", fontSize: 11, fontWeight: 600, marginBottom: 4, color: "#fff9" } },
              E("span", { style: { width: 78 } }, "Feature"),
              E("span", { style: { width: 38, textAlign: "center" } }, "User"),
              E("span", { style: { width: 38, textAlign: "center" } }, "Charla"),
              E("span", { style: { width: 38, textAlign: "center" } }, "Producto"),
              E("span", { style: { width: 18 } }, "")
            ),
            dotSteps.map((step, i) =>
              E("div", { key: step.name, style: {
                display: "flex", alignItems: "center", fontSize: 11, marginBottom: 2,
                background: i % 2 === 0 ? "rgba(255,255,255,.015)" : "rgba(24,195,255,.03)",
                borderRadius: 4
              } },
                E("span", { style: { width: 78, minWidth: 0, color: "#fff8", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, step.name),
                E("span", { style: { width: 38, color: "#18c3ff", textAlign: "center", borderLeft: "1px solid #2222", borderRight: "1px solid #2222" } }, step.user.toFixed(2)),
                E("span", { style: { width: 38, color: "#ff5e00", textAlign: "center", borderRight: "1px solid #2222" } }, step.talk.toFixed(2)),
                E("span", { style: { width: 38, color: step.prod > 0.12 ? "#4de3a3" : "#fff7", textAlign: "center" } }, (step.prod).toFixed(2)),
                step.prod > 0.12 && E("span", { style: { color: "#4de3a3", fontSize: 10, marginLeft: 4 } }, "★")
              )
            ),
            E("div", { style: { marginTop: 6, fontSize: 12, color: "#4de3a3" } }, "Total: ", dotSum.toFixed(2), " (coseno)")
          )
        ),
        E("div", { style: { margin: "10px 0 18px 0" } },
          E("label", { className: "lbl" }, "Puntuacion comparada (Baseline vs Two-Tower)"),
          E("div", { style: { display: "flex", gap: 10, marginBottom: 8, fontSize: 10, color: "#fff9" } },
            E("div", { style: { display: "flex", alignItems: "center", gap: 5 } },
              E("span", { style: { width: 10, height: 10, borderRadius: 2, background: "#7a1ec7", display: "inline-block" } }),
              E("span", null, "Baseline")
            ),
            E("div", { style: { display: "flex", alignItems: "center", gap: 5 } },
              E("span", { style: { width: 10, height: 10, borderRadius: 2, background: "#ff5e00", display: "inline-block" } }),
              E("span", null, "Two-Tower")
            )
          ),
          E("div", { style: { display: "flex", flexDirection: "column", gap: 8 } },
            recomendaciones.map(r =>
              E("div", {
                key: r.id,
                style: {
                  border: "1px solid " + (cmpTalk === r.id ? "rgba(24,195,255,.45)" : "#fff2"),
                  borderRadius: 8,
                  padding: "8px 10px",
                  background: cmpTalk === r.id ? "#18c3ff14" : "rgba(255,255,255,.02)",
                }
              },
                E("div", { style: { fontSize: 11, color: "#fff", marginBottom: 6, display: "flex", justifyContent: "space-between", gap: 8 } },
                  E("span", { style: { whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" } }, (r.talk?.title || r.id)),
                  E("span", { style: { color: "#fff8" } }, "#", r.rank)
                ),
                E("div", { style: { marginBottom: 4 } },
                  E("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 10, color: "#c9a6ff", marginBottom: 2 } },
                    E("span", null, "Baseline"),
                    E("span", null, r.baselineScore)
                  ),
                  E("div", { style: { height: 8, borderRadius: 99, background: "rgba(122,30,199,.18)", overflow: "hidden" } },
                    E("div", { style: { width: r.baselineScore + "%", height: "100%", borderRadius: 99, background: "linear-gradient(90deg,#7a1ec7,#a35ed8)", transition: "width .6s ease" } })
                  )
                ),
                E("div", null,
                  E("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 10, color: "#ffd7bf", marginBottom: 2 } },
                    E("span", null, "Two-Tower"),
                    E("span", null, r.score)
                  ),
                  E("div", { style: { height: 8, borderRadius: 99, background: "rgba(255,94,0,.16)", overflow: "hidden" } },
                    E("div", { style: { width: r.score + "%", height: "100%", borderRadius: 99, background: "linear-gradient(90deg,#ff5e00,#ff8d4a)", transition: "width .6s ease" } })
                  )
                )
              )
            )
          )
        ),
        E("div", { style: { margin: "10px 0 18px 0" } },
          E("label", { className: "lbl" }, "Explicación"),
          E("div", { className: "explain-card" },
            E("div", { className: "explain-badge" },
              E("span", null, "Model Insight"),
              E("span", { style: { color: "#ffb387" } }, "•")
            ),
            E("div", { className: "explain-text" }, explain)
          )
        ),
        E("button", { className: "again", onClick: onBack }, "← Volver a resultados")
      );
    }

      /* ── INPUT ── */
      return E("div", { style: shellSt },
        E(Topbar),
        E(Hero, { sub: E("span", null, "¿Qué charla ", E("em", null, "te recomienda"), " el motor?") }),
        E("div", { className: "card", style: { width: "100%" } },
          E("div", { className: "form-wrap" },
            E("div", { className: "demo-box" },
              E("p", { className: "pill" }, "Demo instantánea · story mode"),
              E("div", { className: "demo-btns" }, DEMO_PROFILES.map(p =>
                E("button", { key: p.id, className: "demo-btn", onClick: () => applyDemoProfile(p) }, p.label)
              ))
            ),
            E("div", null,
              E("label", { className: "lbl" }, "Nombre *"),
              E("input", { className: "inp", placeholder: "Tu nombre", value: name, onChange: e => setName(e.target.value) })
            ),
            E("div", null,
              E("label", { className: "lbl" }, "Rol actual *"),
              E("input", { className: "inp", placeholder: "ej: ML Engineer, Backend Dev, PM", value: role, onChange: e => setRole(e.target.value) })
            ),
            E("div", null,
              E("label", { className: "lbl" }, "Skills e intereses *"),
              E("div", { className: "skills-grid" },
                skillsList.map(s =>
                  E("button", {
                    key: s,
                    className: "skill-btn" + (selectedSkills.includes(s) ? " active" : ""),
                    onClick: () => toggleSkill(s),
                  }, s)
                )
              ),
              E("input", {
                className: "inp",
                placeholder: "Otras skills (opcional)...",
                value: customSkills,
                onChange: e => setCustomSkills(e.target.value),
                style: { marginTop: "8px", fontSize: "12px" },
              }),
              selectedSkills.length > 0 && E("p", { className: "skills-hint" },
                selectedSkills.length + " skill" + (selectedSkills.length > 1 ? "s" : "") + " seleccionada" + (selectedSkills.length > 1 ? "s" : "")
              )
            ),
            E("div", null,
              E("label", { className: "lbl" }, "Seniority"),
              E("div", { className: "snry-wrap" }, SNRY.map(s =>
                E("button", { key: s, style: snrySt(s), onClick: () => setSnry(s) }, s)
              ))
            ),
            E("button", { className: "go", disabled: !canGo, onClick: go }, "Ver mi recomendación")
          )
        ),
        E("p", { className: "ev-tag" }, "27 de mayo · NaranjaX")
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(E(App));
  </script>
</body>
</html>
