<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tech4Impact — Recomendador de Charlas</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --app-max-width: 560px;
      --app-side-pad: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background:
        radial-gradient(ellipse 75% 65% at 22% 45%, #2d0f6e 0%, transparent 65%),
        radial-gradient(ellipse 50% 45% at 80% 80%, #1a0540 0%, transparent 55%),
        #130a2a;
      min-height: 100vh;
      font-family: 'Gibson-Semibold', sans-serif;
      color: #fff;
    }

    #root {
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px var(--app-side-pad) 46px;
      position: relative;
      z-index: 1;
    }

    .topbar {
      width: 100%;
      max-width: var(--app-max-width);
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      padding: 0 4px;
    }

    .nx-wordmark {
      font-family: 'Gibson-Semibold', sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -.01em;
    }

    .powered {
      font-size: 10px;
      color: rgba(255,255,255,.25);
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .hero {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 24px;
      width: 100%;
      max-width: var(--app-max-width);
    }

    .hero-deco {
      position: absolute;
      width: 52px;
      opacity: .55;
      pointer-events: none;
      filter: drop-shadow(0 0 16px rgba(255,94,0,.25));
    }

    .hero-deco.left {
      left: -8px;
      top: 8px;
      transform: rotate(-18deg);
    }

    .hero-deco.right {
      right: -6px;
      top: 36px;
      transform: rotate(16deg);
    }

    .t4i-logo {
      width: 100%;
      max-width: 100%;
      height: auto;
      margin-bottom: 16px;
    }

    .sub {
      font-size: 13px;
      color: rgba(255,255,255,.45);
      text-align: center;
      line-height: 1.5;
      padding: 0 8px;
    }

    .sub em {
      color: #ff5e00;
      font-style: normal;
    }

    .event-stats {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 14px;
    }

    .stat-chip {
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
      padding: 8px 7px;
      text-align: center;
    }

    .stat-num {
      display: block;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .02em;
      color: #fff;
      text-shadow: 0 0 14px rgba(255,94,0,.3);
    }

    .stat-lbl {
      display: block;
      margin-top: 1px;
      font-size: 11px;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: rgba(255,255,255,.65);
    }

    .card {
      background: rgba(28,16,64,.75);
      border: 1px solid rgba(139,60,210,.25);
      border-radius: 18px;
      width: 100%;
      max-width: var(--app-max-width);
      overflow: hidden;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid rgba(139,60,210,.2);
    }

    .form-wrap {
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .lbl {
      font-size: 12px;
      letter-spacing: .1em;
      color: rgba(255,255,255,.35);
      text-transform: uppercase;
      margin-bottom: 5px;
      display: block;
    }

    .inp {
      width: 100%;
      background: rgba(115,33,166,.12);
      border: 1px solid rgba(115,33,166,.35);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 16px;
      color: #fff;
      font-family: 'Gibson-Semibold', sans-serif;
      outline: none;
      transition: border-color .2s, background .2s;
      display: block;
    }

    .inp:focus {
      border-color: rgba(255,94,0,.7);
      background: rgba(115,33,166,.2);
    }

    .inp::-webkit-input-placeholder { color: rgba(180,150,255,.65); }
    .inp::-moz-placeholder           { color: rgba(180,150,255,.65); opacity: 1; }
    .inp:-ms-input-placeholder       { color: rgba(180,150,255,.65); }
    .inp::placeholder                { color: rgba(180,150,255,.65); }

    .hint {
      font-size: 12px;
      color: rgba(180,150,255,.4);
      margin-top: 4px;
    }

    .snry-wrap {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 2px;
    }

    .go {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 50px;
      position: relative;
      background: linear-gradient(90deg, #ff5e00, #7321a6);
      background-size: 220% 220%;
      animation: gradientShift 7s ease infinite;
      color: #fff;
      box-shadow: 0 0 12px #ff5e0055, 0 0 24px #ff5e0038;
      font-family: 'Gibson-Semibold', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-top: 4px;
      cursor: pointer;
      transition: box-shadow .3s, opacity .2s;
    }

    .go:hover {
      box-shadow: 0 0 16px #ff5e0070, 0 0 30px #ff5e0040;
      animation-duration: 4.8s;
    }

    .go:disabled {
      opacity: .2;
      cursor: not-allowed;
      box-shadow: none;
    }

    .loading-wrap {
      padding: 48px 20px;
      text-align: center;
    }

    .dots {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff5e00;
      animation: bop 1.2s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }

    @keyframes bop {
      0%, 80%, 100% { transform: scale(.8); opacity: .3; }
      40%            { transform: scale(1.2); opacity: 1; }
    }

    .ld-txt {
      font-size: 14px;
      color: rgba(255,255,255,.3);
      margin-bottom: 3px;
      letter-spacing: .04em;
    }

    .res-wrap { padding: 22px; }

    .stage-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .particle-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      opacity: .42;
      mix-blend-mode: normal;
      filter: blur(.35px);
      z-index: 0;
    }

    .blob {
      position: absolute;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      filter: blur(45px);
      opacity: .12;
      z-index: 2;
      animation: drift 14s ease-in-out infinite;
    }

    .blob.b1 { background: #ff5e00; top: -80px; left: -90px; }
    .blob.b2 { background: #7a1ec7; bottom: -120px; right: -100px; animation-delay: -4s; }
    .blob.b3 { background: #18c3ff; top: 38%; left: 65%; width: 260px; height: 260px; animation-delay: -8s; }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%      { transform: translate(20px, -16px) scale(1.05); }
      66%      { transform: translate(-18px, 14px) scale(0.96); }
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .demo-box {
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(8, 12, 30, .35);
      border-radius: 12px;
      padding: 10px;
    }

    .demo-btns {
      display: flex;
      flex-direction: row;
      gap: 8px;
      width: 100%;
    }

    .demo-btn {
      flex: 1;
      min-width: 0;
      border: 1px solid rgba(255,255,255,.18);
      color: rgba(255,255,255,.8);
      background: linear-gradient(100deg, rgba(255,255,255,.06), rgba(255,255,255,.02), rgba(255,94,0,.05));
      background-size: 220% 220%;
      animation: gradientShift 11s ease infinite;
      border-radius: 999px;
      padding: 10px 8px;
      font-size: 13px;
      letter-spacing: .04em;
      cursor: pointer;
      transition: all .2s;
      font-family: 'Gibson-Semibold', sans-serif;
      text-align: center;

    .demo-btn:hover {
      border-color: rgba(255,94,0,.6);
      color: #fff;
      background: linear-gradient(100deg, rgba(255,94,0,.2), rgba(122,30,199,.2), rgba(255,94,0,.2));

    .pill {

      align-items: center;
      gap: 6px;

      letter-spacing: .1em;

    .cmp-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;

      margin-bottom: 7px;

    .delta-up { color: #4de3a3; }
    .delta-down { color: #ff8f8f; }
    .delta-flat { color: rgba(255,255,255,.6); }

    .sig-grid {
      display: grid;
      grid-template-columns: 1fr 40px;
      gap: 6px;
      align-items: center;
      margin-top: 8px;
    }

    .sig-name {
      font-size: 12px;
      color: rgba(255,255,255,.75);
    }

    .sig-val {
      font-size: 12px;
      color: rgba(255,255,255,.8);
      text-align: right;
    }

    .sig-bar {
      grid-column: 1 / -1;
      height: 3px;
      border-radius: 99px;
      background: rgba(255,255,255,.12);
      overflow: hidden;
      margin-bottom: 2px;

    .sig-fill {
      height: 100%;
      background: linear-gradient(90deg, #18c3ff, #ff5e00);
      border-radius: inherit;
    }

    .share {
      margin-top: 10px;
      width: 100%;
      border: 1px solid rgba(24,195,255,.45);
      background: rgba(24,195,255,.12);
      color: #d9f7ff;
      font-size: 13px;
      letter-spacing: .08em;
      text-transform: uppercase;
      border-radius: 50px;
      padding: 10px;
      cursor: pointer;
      transition: all .2s;
      font-family: 'Gibson-Semibold', sans-serif;
    }

    .share:hover {
      box-shadow: 0 0 18px rgba(24,195,255,.35);
      background: rgba(24,195,255,.2);
    }

    .share-row {
      display: flex;
      gap: 8px;
      justify-content: flex-start;
      margin: 10px 0 0 0;
      flex-wrap: wrap;
    }

    .impact-share {
      border: 1px solid rgba(255,255,255,.24);
      background: rgba(255,255,255,.08);
      color: #f6f0ff;
      font-size: 13px;
      letter-spacing: .08em;
      text-transform: uppercase;
      border-radius: 50px;
      padding: 10px 14px;
      cursor: pointer;
      transition: all .2s;
      font-family: 'Gibson-Semibold', sans-serif;
    }

    .impact-share:hover {
      box-shadow: 0 0 18px rgba(255,255,255,.18);
      background: rgba(255,255,255,.16);
    }

    .impact-share.tw {
      border-color: rgba(84,172,255,.55);
      background: rgba(84,172,255,.14);
      color: #d9efff;
    }

    .impact-share.ig {
      border-color: rgba(255,114,170,.62);
      background: rgba(255,114,170,.14);
      color: #ffe1ef;
    }

    .impact-share.li {
      border-color: rgba(121,196,255,.62);
      background: rgba(121,196,255,.14);
      color: #dff2ff;
    }

    .share-hint {
      margin: 8px 0 0;
      font-size: 13px;
      color: rgba(214,201,255,.78);
      letter-spacing: .02em;
    }

    @media (max-width: 430px) {
      :root {
        --app-max-width: 100%;
        --app-side-pad: 10px;
      }

      .form-wrap { padding: 14px; gap: 12px; }
      .res-wrap { padding: 14px; }
      .go { font-size: 15px; padding: 13px; }
      .topbar { margin-bottom: 18px; }
      .sub { font-size: 14px; }
      .hero-deco { width: 44px; opacity: .45; }
      .event-stats { gap: 6px; }
      .stat-num { font-size: 15px; }
      .stat-lbl { font-size: 11px; }
    }

    @media (min-width: 900px) {
      :root { --app-max-width: 620px; }
      #root { padding-top: 24px; }

    .chip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: rgba(115,33,166,.15);
      border: 1px solid rgba(115,33,166,.3);

    }

    .av {

      border-radius: 50%;

    .pname {

    .prole {

    .sec-lbl {

    .tk {

      border-radius: 12px;

    .tk.r1 {

    .tk-top {

    .rk {

    .tk-title {

    .sc {

    .bar-track {

    .bar-fill {

    .reason {

    .tk.r1 .reason { color: rgba(255,220,200,.7); }

    .again {
      width: 100%;
      padding: 12px;

      border: 1px solid rgba(115,33,166,.35);
      border-radius: 50px;
      color: rgba(180,150,255,.45);
      font-size: 12px;

        linear-gradient(140deg, rgba(12, 9, 32, .92), rgba(27, 17, 59, .88)) padding-box,
        linear-gradient(120deg, rgba(24,195,255,.65), rgba(255,94,0,.78), rgba(122,30,199,.7)) border-box;
      border: 1px solid transparent;

      line-height: 1.6;

<body>
  <div class="stage-bg">
    <canvas id="particle-canvas" class="particle-canvas"></canvas>
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>
  <div id="root"></div>

  <script>
    const { useState, useEffect, useRef } = React;
    const E = React.createElement;

    function initParticleBackground() {
      const canvas = document.getElementById("particle-canvas");
      if (!canvas) return;

      const prefersReduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const ctx = canvas.getContext("2d", { alpha: true, desynchronized: true });
      if (!ctx) return;

      let width = 0;
      let height = 0;
      let particles = [];
      let rafId = 0;
      let lastTs = 0;
      let frameCount = 0;
      let fpsWindowStart = 0;
      let densityScale = 1;
      let dust = [];

      function baseCountForScreen(w) {
        if (prefersReduced) {
          if (w < 430) return 120;
          if (w < 900) return 180;
          return 260;
        }
        if (w < 430) return 240;
        if (w < 900) return 360;
        return 520;
      }

      function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const target = Math.floor(baseCountForScreen(width) * densityScale);
        particles = Array.from({ length: target }, () => ({
          x: Math.random() * width,
          y: Math.random() * height,
          r: Math.random() * 1.0 + 0.2,
          a: Math.random() * 0.25 + 0.05,
          s: Math.random() * 0.75 + 0.15,
          t: Math.random() * Math.PI * 2,
          pulse: Math.random() * Math.PI * 2,
          hue: Math.random() > 0.75 ? 22 : Math.random() > 0.5 ? 198 : 278,
        }));

        const dustCount = Math.floor(target * 0.08);
        dust = Array.from({ length: dustCount }, () => ({
          x: Math.random() * width,
          y: Math.random() * height,
          r: Math.random() * 0.55 + 0.08,
          t: Math.random() * Math.PI * 2,
          a: Math.random() * 0.2 + 0.04,
        }));
      }

      function step(ts) {
        if (!fpsWindowStart) fpsWindowStart = ts;
        if (!lastTs) lastTs = ts;
        const dt = Math.min((ts - lastTs) / 16.67, 2.4);
        lastTs = ts;
        frameCount++;

        // En vez de limpiar completamente, dejamos una estela tenue tipo polvo cósmico.
        ctx.fillStyle = "rgba(14, 8, 30, 0.32)";
        ctx.fillRect(0, 0, width, height);

        // Acentuamos visibilidad con partículas brillantes y pequeño pulso.
        ctx.globalCompositeOperation = "source-over";

        for (let i = 0; i < particles.length; i++) {
          const p = particles[i];
          const motionScale = prefersReduced ? 0.25 : 1;
          p.t += 0.0035 * dt * motionScale;
          p.pulse += 0.02 * dt * motionScale;
          p.x += (Math.cos(p.t * 1.7) * 0.35 + Math.sin(p.t * 0.9) * 0.22) * p.s * dt * motionScale;
          p.y += (Math.sin(p.t * 1.5) * 0.35 + Math.cos(p.t * 0.7) * 0.22) * p.s * dt * motionScale;

          if (p.x < -6) p.x = width + 6;
          if (p.x > width + 6) p.x = -6;
          if (p.y < -6) p.y = height + 6;
          if (p.y > height + 6) p.y = -6;

          const pulseScale = 0.92 + Math.sin(p.pulse) * 0.16;
          const radius = p.r * pulseScale;
          const alpha = Math.max(0.03, Math.min(0.32, p.a * pulseScale));

          ctx.beginPath();
          ctx.fillStyle = "hsla(" + p.hue + ", 88%, 70%, " + alpha + ")";
          ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
          ctx.fill();
        }

        // Capas extra de estrellitas que titilan para lograr efecto de stardust.
        for (let i = 0; i < dust.length; i++) {
          const d = dust[i];
          d.t += 0.025 * dt;
          const tw = 0.6 + Math.sin(d.t) * 0.4;
          ctx.beginPath();
          ctx.fillStyle = "rgba(245, 250, 255, " + (d.a * tw) + ")";
          ctx.arc(d.x, d.y, d.r * tw, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.globalCompositeOperation = "source-over";

        if (ts - fpsWindowStart > 1800) {
          const fps = (frameCount * 1000) / (ts - fpsWindowStart);
          frameCount = 0;
          fpsWindowStart = ts;

          // Auto-throttle: preserva fluidez en hardware débil.
          if (fps < 42 && densityScale > 0.35) {
            densityScale *= 0.86;
            resize();
          } else if (fps > 57 && densityScale < 1) {
            densityScale = Math.min(1, densityScale * 1.07);
            resize();
          }
        }

        rafId = window.requestAnimationFrame(step);
      }

      function onVisibility() {
        if (document.hidden) {
          window.cancelAnimationFrame(rafId);
          rafId = 0;
          return;
        }
        if (!rafId) {
          lastTs = 0;
          fpsWindowStart = 0;
          frameCount = 0;
          rafId = window.requestAnimationFrame(step);
        }
      }

      resize();
      rafId = window.requestAnimationFrame(step);
      window.addEventListener("resize", resize, { passive: true });
      document.addEventListener("visibilitychange", onVisibility);
    }

    function toVector(features) {
      return FEATURE_ORDER.map(d => Number(features[d] || 0));

    function normalize(vec) {
      const norm = Math.sqrt(vec.reduce((acc, v) => acc + v * v, 0));
      if (!norm) return vec;
      return vec.map(v => v / norm);
    }

    function dot(a, b) {
      let sum = 0;
      for (let i = 0; i < a.length; i++) sum += a[i] * b[i];
      return sum;
    }

    function baselineScores(role, skills) {
      const text = (role + " " + skills).toLowerCase();
      const raw = {};
      for (const [id, p] of Object.entries(PROFILES)) {
        let s = 18;
        for (const k of p.kwds) { if (text.includes(k)) s += 9; }
        for (const r of p.role) { if (text.includes(r)) s += 14; }
        raw[id] = s;
      }
      const max = Math.max(...Object.values(raw));
      const f = max < 75 ? 75 / max : max > 100 ? 100 / max : 1;
      const out = {};
      for (const [id, v] of Object.entries(raw)) out[id] = Math.min(Math.round(v * f), 100);
      return out;
    }

    function buildUserTower(role, skills) {
      const text = (role + " " + skills).toLowerCase();
      const feats = {};
      FEATURE_ORDER.forEach(d => { feats[d] = 0; });

      for (const rule of FEATURE_RULES) {
        for (const term of rule.terms) {
          if (text.includes(term)) feats[rule.dim] += 1;
        }
      }

      // Fallback suave para evitar vector nulo cuando hay muy poca señal.
      const hasSignal = FEATURE_ORDER.some(d => feats[d] > 0);
      if (!hasSignal) {
        feats.product = 1;
        feats.backend = 1;
      }

      return normalize(toVector(feats));
    }

    function userFeatureMap(role, skills) {
      const text = (role + " " + skills).toLowerCase();
      const feats = {};
      FEATURE_ORDER.forEach(d => { feats[d] = 0; });
      for (const rule of FEATURE_RULES) {
        for (const term of rule.terms) {
          if (text.includes(term)) feats[rule.dim] += 1;
        }
      }
      return feats;
    }

    function buildTalkTower(id) {
      if (TALK_TOWER[id]) return normalize(toVector(TALK_TOWER[id]));

      // Fallback para charlas nuevas: inferimos embedding usando keywords del perfil.
      const feats = {};
      FEATURE_ORDER.forEach(d => { feats[d] = 0; });
      const p = PROFILES[id];
      if (!p) return normalize(toVector(feats));

      for (const kw of [...p.kwds, ...p.role]) {
        for (const rule of FEATURE_RULES) {
          for (const term of rule.terms) {
            if (kw.includes(term) || term.includes(kw)) feats[rule.dim] += 0.3;
          }
        }
      }

      return normalize(toVector(feats));
    }

    function computeScores(role, skills) {
      const userVec = buildUserTower(role, skills);
      const out = {};
      for (const id of Object.keys(PROFILES)) {
        const talkVec = buildTalkTower(id);
        const sim = Math.max(0, dot(userVec, talkVec));
        out[id] = Math.min(100, Math.round(40 + sim * 60));
      }
      return out;
    }

    function rankMap(scores) {
      const ids = Object.entries(scores).sort((a, b) => b[1] - a[1]).map(([id]) => id);
      const m = {};
      ids.forEach((id, i) => { m[id] = i + 1; });
      return m;
    }

    function topSignals(role, skills, maxItems) {

      const arr = Object.entries(feats)
        .filter(([, v]) => v > 0)
        .sort((a, b) => b[1] - a[1])
        .slice(0, maxItems || 4);
      const max = arr.length ? arr[0][1] : 1;
      return arr.map(([k, v]) => ({ name: k.toUpperCase(), value: v, pct: Math.round((v / max) * 100) }));
    }

    function recommend(role, skills, name, snry, talks) {

      const twoTowerRank = rankMap(scores);

          talk: (talks || TALKS_FALLBACK).find(t => t.id === id),

          baselineRank: baseRank[id] || null,
          deltaRank: (baseRank[id] || 0) - (twoTowerRank[id] || 0),

      function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight, maxLines) {
        const words = String(text || "").split(/\s+/);
        const lines = [];
        let line = "";
        for (let i = 0; i < words.length; i++) {
          const test = line ? line + " " + words[i] : words[i];
          if (ctx.measureText(test).width <= maxWidth) {
            line = test;
          } else {
            if (line) lines.push(line);
            line = words[i];
          }
        }
        if (line) lines.push(line);
        const clipped = typeof maxLines === "number" ? lines.slice(0, maxLines) : lines;
        clipped.forEach((ln, idx) => ctx.fillText(ln, x, y + idx * lineHeight));
      }

      function drawRoundedRect(ctx, x, y, w, h, r) {
        const rr = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + rr, y);
        ctx.arcTo(x + w, y, x + w, y + h, rr);
        ctx.arcTo(x + w, y + h, x, y + h, rr);
        ctx.arcTo(x, y + h, x, y, rr);
        ctx.arcTo(x, y, x + w, y, rr);
        ctx.closePath();
      }

      function loadImg(url) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.crossOrigin = "anonymous";
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = url;
        });
      }

      async function renderImpactCard(resultData) {
        const top = resultData?.recomendaciones?.[0];
        if (!top) return null;

        const canvas = document.createElement("canvas");
        canvas.width = 1080;
        canvas.height = 1080;
        const ctx = canvas.getContext("2d");
        if (!ctx) return null;

        const grad = ctx.createLinearGradient(0, 0, 1080, 1080);
        grad.addColorStop(0, "#2a0640");
        grad.addColorStop(0.58, "#1a0c57");
        grad.addColorStop(1, "#0f3b63");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 1080, 1080);

        ctx.fillStyle = "rgba(255,255,255,.16)";
        for (let i = 0; i < 120; i++) {
          const x = Math.random() * 1080;
          const y = Math.random() * 1080;
          const r = Math.random() * 1.8 + 0.4;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fill();
        }

        const g1 = ctx.createRadialGradient(120, 970, 40, 120, 970, 340);
        g1.addColorStop(0, "rgba(255,94,0,.36)");
        g1.addColorStop(1, "rgba(255,94,0,0)");
        ctx.fillStyle = g1;
        ctx.fillRect(0, 0, 1080, 1080);

        const g2 = ctx.createRadialGradient(930, 120, 40, 930, 120, 260);
        g2.addColorStop(0, "rgba(24,195,255,.16)");
        g2.addColorStop(1, "rgba(24,195,255,0)");
        ctx.fillStyle = g2;
        ctx.fillRect(0, 0, 1080, 1080);

        let logoPainted = false;
        try {
          const logo = await loadImg(T4I_LOGO);
          const w = 320;
          const h = (logo.height / logo.width) * w;
          ctx.globalAlpha = 0.95;
          ctx.drawImage(logo, 760, 82, w, h);
          ctx.globalAlpha = 1;
          logoPainted = true;
        } catch (_) {}

        drawRoundedRect(ctx, 64, 272, 952, 550, 36);
        ctx.fillStyle = "rgba(19,8,40,.58)";
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,.12)";
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = "rgba(213,196,255,.7)";
        ctx.font = "600 34px Gibson-Semibold, sans-serif";
        ctx.textAlign = "left";
        ctx.fillText("CHARLA RECOMENDADA", 110, 358);

        ctx.fillStyle = "rgba(255,255,255,.98)";
        ctx.font = "700 94px Gibson-Semibold, sans-serif";
        ctx.textAlign = "center";
        wrapCanvasText(ctx, String(top.talk?.title || top.id), 118, 470, 844, 102, 4);

        if (!logoPainted) {
          ctx.fillStyle = "rgba(255,255,255,.74)";
          ctx.font = "700 60px Gibson-Semibold, sans-serif";
          ctx.textAlign = "right";
          ctx.fillText("Tech4Impact", 1006, 156);
        }

        return canvas;
      }

      async function tryNativeShare(file, shareText) {

      function downloadBlob(blob, fileName) {

        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 30000);

        } catch (_) {

      return E("div", { style: shellSt },
        E(Topbar),
        E(Hero, { sub: E("span", null, "¿Qué charla ", E("em", null, "te recomienda"), " el motor?") }),
        E("div", { className: "card", style: { width: "100%" } },
          E("div", { className: "tabs" },
            E("button", { style: tabSt("linkedin"), onClick: () => setMode("linkedin") }, "LinkedIn"),
            E("button", { style: tabSt("manual"),   onClick: () => setMode("manual")   }, "Manual")
          ),
          E("div", { className: "form-wrap" },
            E("div", { className: "demo-box" },
              E("p", { className: "pill" }, "Demo instantánea · story mode"),
              E("div", { className: "demo-btns" }, DEMO_PROFILES.map(p =>
                E("button", { key: p.id, className: "demo-btn", onClick: () => applyDemoProfile(p) }, p.label)
              ))
            ),
            mode === "linkedin" && E("div", null,
              E("label", { className: "lbl" }, "URL de LinkedIn"),
              E("input", { className: "inp", placeholder: "linkedin.com/in/tu-nombre", value: url, onChange: e => onUrl(e.target.value) }),
              E("p", { className: "hint" }, "Extraemos tu nombre del URL automáticamente.")
            ),
            E("div", null,
              E("label", { className: "lbl" }, "Nombre *"),
              E("input", { className: "inp", placeholder: "Tu nombre", value: name, onChange: e => setName(e.target.value) })
            ),
            E("div", null,
              E("label", { className: "lbl" }, "Rol actual *"),
              E("input", { className: "inp", placeholder: "ej: ML Engineer, Backend Dev, PM", value: role, onChange: e => setRole(e.target.value) })
            ),
            E("div", null,
              E("label", { className: "lbl" }, "Skills e intereses *"),
              E("div", { className: "skills-grid" },
                skillsList.map(s =>
                  E("button", {
                    key: s,
                    className: "skill-btn" + (selectedSkills.includes(s) ? " active" : ""),
                    onClick: () => toggleSkill(s),
                  }, s)
                )
              ),
              E("input", {
                className: "inp",
                placeholder: "Otras skills (opcional)...",
                value: customSkills,
                onChange: e => setCustomSkills(e.target.value),
                style: { marginTop: "8px", fontSize: "12px" },
              }),
              selectedSkills.length > 0 && E("p", { className: "skills-hint" },
                selectedSkills.length + " skill" + (selectedSkills.length > 1 ? "s" : "") + " seleccionada" + (selectedSkills.length > 1 ? "s" : "")
              )
            ),
            E("div", null,
              E("label", { className: "lbl" }, "Seniority"),
              E("div", { className: "snry-wrap" }, SNRY.map(s =>
                E("button", { key: s, style: snrySt(s), onClick: () => setSnry(s) }, s)
              ))
            ),
            E("button", { className: "go", disabled: !canGo, onClick: go }, "Ver mi recomendación")
          )
        ),
        E("p", { className: "ev-tag" }, "27 de mayo · NaranjaX")
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(E(App));
  </script>
</body>
</html>
